version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys
      POSTGRES_DB: movielens
      # Dev-only: allow pgBouncer to reach Postgres without SCRAM
      # (pgBouncer's autogenerated userlist stores plain passwords).
      # Production compose stacks will use scram-sha-256 with a
      # proper pgBouncer userlist containing SCRAM hashes.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # SQL scripts mounted here run once on a fresh data volume. Used to
      # bootstrap the `mlflow` database MLflow needs as its backend store.
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    # Custom image extending ghcr.io/mlflow/mlflow:v2.13.0 with psycopg2 so
    # MLflow can reach its Postgres backend store. The `image:` tag below
    # names the locally-built image so subsequent `up`s use the cache.
    build:
      context: ./infra/mlflow
    image: movielens-recsys/mlflow:v2.13.0-pg
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://recsys:recsys@postgres:5432/mlflow
      --default-artifact-root /mlartifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlartifacts
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # pgBouncer sits in front of the movielens Postgres. Only Bundle #1b's
  # FastAPI service uses it; offline training scripts continue connecting
  # to postgres:5432 directly as admin_user (BYPASSRLS). Transaction pool
  # mode is required so `SET LOCAL app.tenant_id` inside the middleware's
  # per-request transaction cannot leak across requests — see ADR 0008.
  #
  # Configured via mounted infra/pgbouncer/pgbouncer.ini + userlist.txt
  # rather than edoburu's env-var interface. The env-var mode pins a
  # single upstream user; the mounted config exposes movielens_app
  # (upstream = app_user, RLS applies) and movielens_admin (upstream =
  # admin_user, BYPASSRLS) as separate database aliases, so per-role
  # pooling works as ADR 0008's rationale-5 assumes.
  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    entrypoint: ["/usr/bin/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  # Keycloak needs its own Postgres. Keeping it separate from the
  # movielens DB is deliberate — Keycloak's schema is opaque, backed up
  # on a different cadence, and should not share a lifecycle with
  # application data. See ADR 0007.
  keycloak-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Realm-per-tenant Keycloak (see ADR 0007). Realm JSONs seeded from
  # ./infra/keycloak/realms/ are imported on startup. Admin creds are
  # dev-only; the compose stack is not for production use as-is.
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mlflow_artifacts:
  grafana_data:
  keycloak_postgres_data:
