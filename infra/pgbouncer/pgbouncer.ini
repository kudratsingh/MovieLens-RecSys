; pgBouncer config for the movielens dev stack. Replaces the env-var
; driven auto-generated config Bundle #1a shipped, so per-role pooling
; works: app_user connections go through as app_user (RLS applies) and
; admin_user connections go through as admin_user (BYPASSRLS). Both
; roles are pool-partitioned by pgBouncer so an app_user connection
; can never reuse an admin_user's session.
;
; Transaction pool mode is required (ADR 0008): the middleware sets
; app.tenant_id via SET LOCAL inside a per-request transaction, and
; that setting must not leak to the next transaction on the same
; connection. Session mode would preserve SET LOCAL across the
; connection lifetime and defeat isolation.

[databases]
; Each entry pins the upstream user. Multiple entries with the same
; database name aren't allowed, so we expose the same movielens DB
; twice under different names — clients pick the alias that matches
; the role they want. movielens_app -> app_user, movielens_admin ->
; admin_user. Applications construct their DSN accordingly.
movielens = host=postgres port=5432 dbname=movielens
movielens_app = host=postgres port=5432 dbname=movielens user=app_user
movielens_admin = host=postgres port=5432 dbname=movielens user=admin_user

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

; Client-facing auth. userlist.txt lists the roles we accept. Dev-only
; passwords; production uses SCRAM against pg_shadow via auth_query.
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt

; Per ADR 0008 §risks: session mode is a leak vector. Enforced.
pool_mode = transaction

; Enough headroom for the FastAPI service (Bundle #1b) plus the
; nightly synthetic-load harness (ADR 0010) plus ad-hoc dev clients.
max_client_conn = 200
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

; The RLS session variable is a custom GUC. pgBouncer blocks unknown
; startup parameters by default. extra_float_digits and search_path
; are common psycopg2 defaults; app.tenant_id itself is set via
; SET LOCAL inside a transaction, not as a startup parameter, so it
; doesn't need to be whitelisted here.
ignore_startup_parameters = extra_float_digits,search_path

; Admin console access from inside the container only (never exposed
; on the network). Used by the startup-assertion in Bundle #1b's
; FastAPI app to query SHOW POOLS and verify pool_mode = transaction.
admin_users = pgbouncer_admin
stats_users = pgbouncer_admin
