name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Install the project (with dev extras) so mypy sees the real types
      # of external classes like pydantic's BaseSettings. Without this, mypy's
      # `ignore_missing_imports` makes them Any, and strict mode's
      # `disallow_subclassing_any` fires on every legitimate subclass.
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/ notebooks/
      - run: black --check src/ tests/ notebooks/
      - run: mypy src/ notebooks/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v || [ $? -eq 5 ]

  feature-parity:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/feature_parity/ -v || [ $? -eq 5 ]

  # Non-negotiable #9: no code path may return one tenant's data in
  # response to another tenant's request. This job boots the full
  # compose stack (Postgres + pgBouncer + Keycloak), runs the Alembic
  # migrations so RLS policies are in place, then exercises the
  # tenant-isolation suite. Triggered on any PR touching src/serving/,
  # src/auth/, migrations, or the compose stack.
  tenant-isolation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"

      # Bring up only the services the tenant-isolation test needs.
      # MLflow / Grafana / Prometheus are irrelevant here and add
      # ~30s to job time if included.
      - name: Start compose stack
        run: docker compose up -d postgres keycloak-postgres keycloak pgbouncer

      # Wait for readiness. Keycloak's cold start is the long pole
      # (~15 s on modern GitHub runners); pgBouncer + Postgres are
      # sub-second.
      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 60); do
            if curl -sSf http://localhost:8080/realms/default > /dev/null; then
              echo "Keycloak ready"; exit 0
            fi
            sleep 2
          done
          echo "Keycloak did not become ready"; exit 1

      # Create empty base tables. In dev the ingest path
      # (`make data-ingest`) creates ratings/movies/tags/links as a
      # side effect of loading the 25M CSVs; CI skips ingest because
      # it doesn't have the DVC-tracked data. Migration 0003 does
      # `ALTER TABLE ratings ADD COLUMN tenant_id`, so the base
      # tables must exist first. `create_tables` is idempotent
      # (SQLAlchemy uses CREATE TABLE IF NOT EXISTS internally).
      - name: Create empty base tables
        run: |
          python -c "
          from sqlalchemy import create_engine
          from src.config import Settings
          from src.data.schema import create_tables
          create_tables(create_engine(Settings().database_url))
          print('Base tables created.')
          "

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run tenant-isolation suite
        run: pytest tests/tenant_isolation/ -v

      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose logs postgres || true
          docker compose logs pgbouncer || true
          docker compose logs keycloak || true
